# Configuração da aplicação Solid Practice
spring:
    application:
        name: solid-practice
    datasource:
        url: jdbc:postgresql://localhost:5432/solid_practice
        username: app
        password: appsecret
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                format_sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect
    flyway:
        enabled: true

server:
    port: 8080
