services:
  postgres:
    image: postgres:16-alpine
    container_name: solid-practice-db
    environment:
      POSTGRES_DB: solid_practice
      POSTGRES_USER: app
      POSTGRES_PASSWORD: appsecret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d solid_practice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
